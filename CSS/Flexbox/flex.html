<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            width: 100vw;
            padding: 0;
            margin: 0;
        }
        .container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .first {
            /* no height needed */
            padding: 40px 0px;
        }

        .second {
            /* flex: 1; */
            flex-grow: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="first">
            Header content with dynamic height
        </div>

        <div class="second">
            Remaining space
        </div>
    </div>
</body>

</html>
