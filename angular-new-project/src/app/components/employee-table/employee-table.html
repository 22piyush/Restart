<table class="table table-bordered">

  <thead>
    <tr>
      <th>Id</th>
      <th>First Name</th>
      <th>Last Name</th>
      <th>Email</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>

    @for(emp of employees; track emp.id){

      <tr>
        <td>{{emp.id}}</td>
        <td>{{emp.firstName}}</td>
        <td>{{emp.lastName}}</td>
        <td>{{emp.email}}</td>

        <td>
          <button
          class="btn btn-danger"
          (click)="deleteEmployee(emp.id)">
            Delete
          </button>
        </td>
      </tr>

    }

  </tbody>

</table>
