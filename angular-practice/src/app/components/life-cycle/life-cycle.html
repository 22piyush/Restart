<p>life-cycle works!</p>

<button (click)="name = name + 1">Button</button>

@for(item of numArr; track $index){
<b>{{item}} &nbsp;</b>
}

<input type="number" #newNum>
<button (click)="numArr.push(+newNum.value)">Add Arr</button>


<app-child-life-cycle [name]="name" [numArr]="numArr"></app-child-life-cycle>
