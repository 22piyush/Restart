<div>
    <h1 class="text-center">Custom Pipes: (remaining)</h1>
    <textarea [(ngModel)]="msg" maxlength="100"></textarea>
    <div>Message: {{msg | remaining}}</div>
</div>



@for (ele of (numArr | mySort); track $index) {
<b>{{ ele }} &nbsp;</b>

}


<input type="number" #newNum>

<button
  (click)="newNum.value && numArr.push(+newNum.value); newNum.value = ''">
  Add
</button>
